name: 'Register Azure Resource Providers'
description: 'Registers required Azure resource providers for integration services'
runs:
  using: 'composite'
  steps:
    - name: Register resource providers
      shell: bash
      run: |
        if [ -f "publish/scripts/RegisterResourceProviders.sh" ]; then
          echo "Using script from publish directory"
          bash publish/scripts/RegisterResourceProviders.sh
        elif [ -f "helper-modules/scripts/RegisterResourceProviders.sh" ]; then
          echo "Using script from helper-modules/scripts"
          bash helper-modules/scripts/RegisterResourceProviders.sh
        else
          echo "Error: RegisterResourceProviders.sh not found in publish/scripts/ or helper-modules/scripts/"
          exit 1
        fi
