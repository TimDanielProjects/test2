name: 'Set RBAC Role for Storage Account Blob Access'
description: 'Assigns Storage Blob Data Contributor role to the specified principal for the storage account. Assumes az CLI is already authenticated (e.g. via OIDC login).'
runs:
  using: 'composite'
  steps:
    - name: Set RBAC role for storage account blob access
      shell: bash
      run: |
        chmod +x publish/scripts/SetRBACRole.sh
        publish/scripts/SetRBACRole.sh \
          "${{ inputs.resource_group }}" \
          "${{ inputs.storage_account_name }}" \
          "${{ inputs.client_id }}" \
          "${{ inputs.subscription_id }}"
inputs:
  client_id:
    description: 'Service principal client (application) ID.'
    required: true
  subscription_id:
    description: 'Azure subscription ID.'
    required: true
  resource_group:
    description: 'Resource group name.'
    required: true
  storage_account_name:
    description: 'Storage account name.'
    required: true
